<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar EduFlex</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <img src="logo_project_website_uid-removebg-preview.png" alt="EduFlex Logo">
        <h2>EduFlex</h2>
        <p class="subtitle">Buat Akun Baru Anda</p>
    </div>

    <form action="login.html" class="form-box">

        <div>Nama Lengkap</div>
        <input type="text" placeholder="Masukkan nama lengkap Anda" required>

        <div>Email atau Nama Pengguna</div>
        <input type="text" placeholder="Masukkan email atau nama pengguna Baru" required>

        <div>Kata Sandi</div>
        <input type="password" placeholder="Buat kata sandi Anda" required>

        <div>Konfirmasi Kata Sandi</div>
        <input type="password" placeholder="Ulangi kata sandi Anda" required>

        <button class="btn-login" type="submit">Daftar</button>

        <div class="atau">ATAU</div>

        <button class="btn-google" type="button">
            Daftar dengan Google
        </button>

        <p class="register">
            Sudah punya akun? <a href="login.html">Masuk</a>
        </p>

    </form>

</div>

</body>
</html>
